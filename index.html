<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>H.A.W.K. Grading System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');
  :root{--gold:#C9A84C;--gold-light:#E8C46A;--dark:#0D0D0D;--dark2:#141414;--dark3:#1C1C1C;--dark4:#252525;--dark5:#2E2E2E;--text:#F0EDE6;--text-dim:#8A8580;--green:#4CAF7D;--red:#E05252;--border:#333;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--dark);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;}
  .header{background:var(--dark2);border-bottom:2px solid var(--gold);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:12px;}
  .logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:26px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;white-space:nowrap;}
  .logo span{color:var(--text);}
  .header-right{display:flex;align-items:center;gap:10px;}
  .prac-select{background:var(--dark4);border:1px solid var(--border);color:var(--text);font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;padding:7px 12px;border-radius:3px;outline:none;cursor:pointer;}
  .nav-tabs{display:flex;background:var(--dark2);border-bottom:1px solid var(--border);overflow-x:auto;}
  .nav-tab{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:1.5px;text-transform:uppercase;padding:12px 20px;cursor:pointer;color:var(--text-dim);border-bottom:3px solid transparent;white-space:nowrap;transition:all 0.2s;background:none;border-top:none;border-left:none;border-right:none;}
  .nav-tab:hover{color:var(--text);}
  .nav-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
  .tab-badge{display:inline-block;background:var(--gold);color:var(--dark);font-size:11px;font-weight:700;padding:1px 6px;border-radius:10px;margin-left:4px;vertical-align:middle;}
  .main{padding:20px;max-width:960px;margin:0 auto;}
  .hidden{display:none!important;}
  .section-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
  .section-title::after{content:'';flex:1;height:1px;background:var(--border);}
  .section-sub{font-family:'Barlow Condensed',sans-serif;font-weight:400;font-size:14px;color:var(--text-dim);letter-spacing:0;text-transform:none;margin-left:4px;}
  .card{background:var(--dark3);border:1px solid var(--border);border-radius:4px;padding:18px;margin-bottom:14px;}
  .card-flush{background:var(--dark3);border:1px solid var(--border);border-radius:4px;margin-bottom:14px;overflow:hidden;}
  .btn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:14px;letter-spacing:1.5px;text-transform:uppercase;padding:9px 20px;border-radius:3px;cursor:pointer;border:none;transition:all 0.2s;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;}
  .btn:disabled{opacity:0.4;cursor:not-allowed;}
  .btn-gold{background:var(--gold);color:var(--dark);}
  .btn-gold:hover:not(:disabled){background:var(--gold-light);}
  .btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-dim);}
  .btn-outline:hover:not(:disabled){border-color:var(--gold);color:var(--gold);}
  .btn-green{background:var(--green);color:var(--dark);}
  .btn-green:hover:not(:disabled){filter:brightness(1.1);}
  .btn-red{background:transparent;border:1px solid var(--red);color:var(--red);}
  .btn-red:hover:not(:disabled){background:var(--red);color:#fff;}
  .btn-sm{padding:5px 12px;font-size:12px;}
  .btn-lg{padding:13px 28px;font-size:16px;}
  .grade-scale{display:flex;gap:6px;flex-wrap:wrap;}
  .grade-pill{display:flex;align-items:center;gap:6px;background:var(--dark4);border:1px solid var(--border);border-radius:3px;padding:4px 10px;font-size:12px;}
  .grade-num{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;color:var(--gold);}
  .upload-zone{border:2px dashed var(--border);border-radius:6px;padding:40px 20px;text-align:center;transition:all 0.25s;background:var(--dark3);}
  .upload-zone:hover{border-color:var(--gold);background:rgba(201,168,76,0.04);}
  .upload-zone.dragover{border-color:var(--gold);background:rgba(201,168,76,0.08);}
  #photoInput{display:none;}
  .upload-icon{font-size:48px;margin-bottom:10px;display:block;}
  .upload-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:20px;letter-spacing:1px;margin-bottom:6px;}
  .upload-hint{color:var(--text-dim);font-size:13px;line-height:1.6;margin-bottom:20px;}
  .upload-btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  .upload-tap-btn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:15px;letter-spacing:1.5px;text-transform:uppercase;padding:13px 26px;border-radius:4px;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:8px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
  .upload-tap-btn.primary{background:var(--gold);color:var(--dark);}
  .upload-tap-btn.secondary{background:var(--dark4);border:1px solid var(--border);color:var(--text-dim);}
  .sheet-tracker{display:flex;flex-wrap:wrap;gap:8px;align-items:center;}
  .sheet-chip{display:inline-flex;align-items:center;gap:6px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;padding:5px 12px;border-radius:20px;border:1px solid var(--border);color:var(--text-dim);background:var(--dark4);}
  .sheet-chip.confirmed{border-color:var(--green);color:var(--green);background:rgba(76,175,125,0.12);}
  .sheet-chip .del-sheet{background:none;border:none;color:var(--red);cursor:pointer;font-size:13px;padding:0 0 0 4px;line-height:1;}
  .preview-img{max-width:100%;max-height:300px;border-radius:4px;border:1px solid var(--border);display:block;margin-bottom:12px;}
  .loading-wrap{padding:16px 0 8px;}
  .loading-bar{height:3px;background:var(--dark5);border-radius:2px;overflow:hidden;margin-bottom:10px;}
  .loading-fill{height:100%;background:var(--gold);border-radius:2px;animation:pulse 1.6s ease-in-out infinite;}
  @keyframes pulse{0%{width:10%}50%{width:80%}100%{width:10%}}
  .loading-text{font-size:13px;color:var(--text-dim);text-align:center;}
  .alert{padding:10px 14px;border-radius:3px;font-size:13px;margin-bottom:12px;border-left:3px solid;}
  .alert-gold{background:rgba(201,168,76,0.1);border-color:var(--gold);color:var(--gold-light);}
  .alert-green{background:rgba(76,175,125,0.1);border-color:var(--green);color:var(--green);}
  .alert-red{background:rgba(224,82,82,0.1);border-color:var(--red);color:#F07070;}
  .confirm-table{width:100%;border-collapse:collapse;font-size:13px;}
  .confirm-table th{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--text-dim);padding:8px;border-bottom:1px solid var(--border);background:var(--dark4);text-align:left;}
  .confirm-table td{padding:5px 8px;border-bottom:1px solid #222;}
  .confirm-table tr:last-child td{border-bottom:none;}
  .confirm-table input{background:var(--dark5);border:1px solid var(--border);color:var(--text);font-size:13px;padding:4px 7px;border-radius:2px;width:100%;outline:none;}
  .confirm-table input:focus{border-color:var(--gold);}
  .confirm-table select{background:var(--dark5);border:1px solid var(--border);color:var(--text);font-size:13px;padding:4px 6px;border-radius:2px;outline:none;width:100%;}
  .entry-table{width:100%;border-collapse:collapse;font-size:13px;}
  .entry-table th{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);background:var(--dark4);}
  .entry-table td{padding:7px 10px;border-bottom:1px solid #222;vertical-align:middle;}
  .entry-table tr:last-child td{border-bottom:none;}
  .entry-table td input{background:transparent;border:1px solid transparent;color:var(--text);font-size:13px;padding:2px 5px;border-radius:2px;width:100%;outline:none;}
  .entry-table td input:focus{background:var(--dark5);border-color:var(--gold);}
  .entry-table td select{background:transparent;border:1px solid transparent;color:var(--text);font-size:13px;padding:2px 4px;border-radius:2px;outline:none;}
  .entry-table td select:focus{background:var(--dark5);border-color:var(--gold);}
  .sheet-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--text-dim);background:var(--dark5);padding:2px 7px;border-radius:2px;}
  .results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px;margin-bottom:14px;}
  .player-card{background:var(--dark4);border:1px solid var(--border);border-radius:4px;padding:14px;}
  .player-name-r{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;letter-spacing:1px;margin-bottom:6px;}
  .player-stats{display:flex;gap:14px;flex-wrap:wrap;}
  .stat-block label{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);display:block;margin-bottom:2px;}
  .stat-block .val{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px;color:var(--gold);}
  .stat-block .val.red{color:var(--red);}
  .stbl{width:100%;border-collapse:collapse;font-size:14px;}
  .stbl th{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--dark4);}
  .stbl td{padding:10px 12px;border-bottom:1px solid #222;}
  .stbl tr:last-child td{border-bottom:none;}
  .rank{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:22px;color:var(--text-dim);}
  .rank.gold{color:var(--gold);}
  .pname{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:16px;}
  .gval{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;color:var(--gold);}
  .missed-count{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:18px;color:var(--red);}
  .missed-count.zero{color:var(--green);}
  .flex{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .spacer{flex:1;}
  .empty-state{text-align:center;padding:32px 20px;color:var(--text-dim);}
  .empty-state .icon{font-size:32px;display:block;margin-bottom:8px;}
  .divider{height:1px;background:var(--border);margin:16px 0;}
  .apikey-wrap{background:var(--dark3);border:1px solid var(--gold);border-radius:6px;padding:20px;margin-bottom:14px;}
  .apikey-wrap input{background:var(--dark5);border:1px solid var(--border);color:var(--text);font-size:13px;padding:8px 12px;border-radius:3px;width:100%;outline:none;margin:10px 0;font-family:monospace;}
  .apikey-wrap input:focus{border-color:var(--gold);}
  .apikey-status{font-size:12px;margin-top:6px;}
  .apikey-status.ok{color:var(--green);}
  .apikey-status.missing{color:var(--red);}
</style>
</head>
<body>
<div class="header">
  <div class="logo">H.A.W.K. <span>Grades</span></div>
  <div class="header-right">
    <select class="prac-select" id="globalPrac" onchange="switchPractice(this.value)">
      <script>for(let i=1;i<=15;i++)document.write(`<option value="${i}">Practice ${i}</option>`);</script>
    </select>
  </div>
</div>
